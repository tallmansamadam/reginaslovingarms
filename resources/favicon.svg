<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-label="Regina's Loving Arms">
  <title>Regina's Loving Arms Home Health Care</title>
  <defs>
    <!-- Teal gradient for house -->
    <linearGradient id="tealG" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2A7D7D"/>
      <stop offset="100%" stop-color="#5DBDBD"/>
    </linearGradient>

    <!-- Radial gold for left hand -->
    <radialGradient id="gldL" cx="62%" cy="28%" r="62%" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#F4E074"/>
      <stop offset="48%"  stop-color="#C9A227"/>
      <stop offset="100%" stop-color="#7A5406"/>
    </radialGradient>

    <!-- Radial gold for right hand -->
    <radialGradient id="gldR" cx="38%" cy="28%" r="62%" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#F4E074"/>
      <stop offset="48%"  stop-color="#C9A227"/>
      <stop offset="100%" stop-color="#7A5406"/>
    </radialGradient>

    <!-- Linear gold for heart -->
    <linearGradient id="gldH" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%"   stop-color="#EDD060"/>
      <stop offset="100%" stop-color="#A87810"/>
    </linearGradient>
  </defs>

  <!-- LEFT HAND (opening outward/left from baseline at bottom) -->
  <path d="M 15,80
           C 8,72  2,58  1,42
           C 0,35  3,28  8,26
           C 12,24  16,26  18,32
           C 21,42  24,54  28,65
           C 30,72  25,80  15,80
           Z"
        fill="url(#gldL)"/>

  <!-- RIGHT HAND (opening outward/right from baseline at bottom) -->
  <path d="M 85,80
           C 92,72  98,58  99,42
           C 100,35  97,28  92,26
           C 88,24  84,26  82,32
           C 79,42  76,54  72,65
           C 70,72  75,80  85,80
           Z"
        fill="url(#gldR)"/>

  <!-- HOUSE ROOF (left) -->
  <line x1="35"  y1="48" x2="50" y2="25" stroke="url(#tealG)" stroke-width="3.5" stroke-linecap="round"/>

  <!-- HOUSE ROOF (right) -->
  <line x1="65" y1="48" x2="50" y2="25" stroke="url(#tealG)" stroke-width="3.5" stroke-linecap="round"/>

  <!-- HOUSE WALLS (left) -->
  <line x1="36" y1="49" x2="36" y2="68" stroke="url(#tealG)" stroke-width="2.8" stroke-linecap="round"/>

  <!-- HOUSE WALLS (right) -->
  <line x1="64" y1="49" x2="64" y2="68" stroke="url(#tealG)" stroke-width="2.8" stroke-linecap="round"/>

  <!-- HOUSE BASE -->
  <line x1="36" y1="68" x2="64" y2="68" stroke="url(#tealG)" stroke-width="2.8" stroke-linecap="round"/>

  <!-- HEART -->
  <path d="M 50,63
           C 44,57  37,51  37,44
           C 37,39  41,36  46,36
           C 49,36  50,39  50,42
           C 50,39  51,36  54,36
           C 59,36  63,39  63,44
           C 63,51  56,57  50,63
           Z"
        fill="url(#gldH)"/>
</svg>
