<!--
  Replacement for the single-stat .stats-bar on index.html.

  Current: one chip (24/7 Care Available) fills a full-width band.
  Proposed: four chips that double as trust signals and answer
  the questions a visitor is silently asking.

  No new CSS classes needed — adds nothing the current .stat-item rules
  don't already cover. Existing .stats-grid uses flex with gap: 20px;
  with four items it should distribute evenly. If the desktop spacing
  looks too cramped at 4, add `justify-content: space-around` to .stats-grid
  in styles.css, or wrap each chip with a min-width: 200px.

  Adjust the numbers to match what's verifiable. If "48-hour start" can't
  be guaranteed, swap it out — pick whichever stats you can defend.
-->

<section class="stats-bar" aria-label="Why families choose Regina's Loving Arms">
  <div class="container">
    <div class="stats-grid">

      <div class="stat-item">
        <i class="fas fa-clock" aria-hidden="true"></i>
        <span class="stat-number">24/7</span>
        <span class="stat-label">Care available, 365 days a year</span>
      </div>

      <div class="stat-item">
        <i class="fas fa-shield-alt" aria-hidden="true"></i>
        <span class="stat-number">6+</span>
        <span class="stat-label">Major insurance plans accepted</span>
      </div>

      <div class="stat-item">
        <i class="fas fa-bolt" aria-hidden="true"></i>
        <span class="stat-number">48 hr</span>
        <span class="stat-label">Typical time to first visit</span>
      </div>

      <div class="stat-item">
        <i class="fas fa-hand-holding-heart" aria-hidden="true"></i>
        <span class="stat-number">Free</span>
        <span class="stat-label">In-home assessment, no obligation</span>
      </div>

    </div>
  </div>
</section>
